{% extends "admin/base.html" %}

{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Application Management</h2>
    <a href="{{ url_for('admin_add_application') }}" class="btn btn-success">Add New Application</a>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Icon</th>
            <th>Name</th>
            <th>Description</th>
            <th>Path</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for app in applications %}
        <tr>
            <td>{{ app.id }}</td>
            <td><i class="fas fa-{{ app.icon | default('cube') }}"></i></td>
            <td>{{ app.name }}</td>
            <td>{{ app.description }}</td>
            <td>{{ app.path }}</td>
            <td class="actions">
                <a href="{{ url_for('admin_edit_application', app_id=app.id) }}" class="btn btn-sm btn-primary">Edit</a>
                <form action="{{ url_for('admin_delete_application', app_id=app.id) }}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this application? This cannot be undone.');">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
