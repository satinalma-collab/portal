{% extends "admin/base.html" %}

{% block admin_content %}
<h2>{{ 'Edit' if menu else 'Add New' }} Menu Item</h2>

<form method="post">
    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" class="form-control" id="title" name="title" value="{{ menu.title if menu else '' }}" required>
    </div>

    <div class="form-group">
        <label for="path">Path</label>
        <input type="text" class="form-control" id="path" name="path" value="{{ menu.path if menu else '' }}" placeholder="e.g., /support" required>
        <small class="form-text text-muted">Must start with a forward slash (/). Use '/' for the homepage.</small>
    </div>

    <div class="form-group">
        <label for="order">Order</label>
        <input type="number" class="form-control" id="order" name="order" value="{{ menu.order if menu else '10' }}" required>
        <small class="form-text text-muted">A smaller number will appear earlier in the menu.</small>
    </div>

    <button type="submit" class="btn btn-primary">{{ 'Update' if menu else 'Create' }} Menu Item</button>
    <a href="{{ url_for('admin_menus') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
