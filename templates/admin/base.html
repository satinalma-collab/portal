{% extends "base.html" %}

{% block title %}Admin Panel - PortalCore{% endblock %}

{% block content %}
<style>
    .admin-wrapper {
        display: flex;
        margin-top: 20px;
    }
    .admin-sidebar {
        width: 220px;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        height: fit-content;
    }
    .admin-sidebar h3 {
        margin-top: 0;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
    }
    .admin-sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .admin-sidebar ul li a {
        display: block;
        padding: 10px 15px;
        color: #333;
        text-decoration: none;
        border-radius: 4px;
        margin-bottom: 5px;
    }
    .admin-sidebar ul li a:hover,
    .admin-sidebar ul li a.active {
        background-color: #007bff;
        color: #fff;
    }
    .admin-content {
        flex-grow: 1;
        margin-left: 30px;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    /* Table Styles */
    .table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    .table th, .table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #e0e0e0;
    }
    .table th {
        background-color: #f8f9fa;
        font-weight: 600;
    }
    .table-striped tbody tr:nth-of-type(odd) {
        background-color: #f8f9fa;
    }
    .table .actions {
        display: flex;
        gap: 5px;
    }
    .btn-sm {
        padding: 5px 10px;
        font-size: 0.875rem;
    }
    .btn-danger { background-color: #dc3545; color: white; }
    .btn-success { background-color: #28a745; color: white; }
</style>

<div class="admin-wrapper">
    <aside class="admin-sidebar">
        <h3>Admin Menu</h3>
        <ul>
            <li><a href="{{ url_for('admin_dashboard') }}" class="{{ 'active' if request.endpoint == 'admin_dashboard' else '' }}">Dashboard</a></li>
            <li><a href="{{ url_for('admin_users') }}" class="{{ 'active' if 'user' in request.endpoint else '' }}">User Management</a></li>
            <li><a href="{{ url_for('admin_applications') }}" class="{{ 'active' if 'application' in request.endpoint else '' }}">Application Management</a></li>
            <li><a href="{{ url_for('admin_menus') }}" class="{{ 'active' if 'menu' in request.endpoint else '' }}">Menu Management</a></li>
        </ul>
    </aside>
    <main class="admin-content">
        {% block admin_content %}{% endblock %}
    </main>
</div>
{% endblock %}
